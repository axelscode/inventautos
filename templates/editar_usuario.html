<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INVENTAUTOS - Editar Usuario</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .form-container { background: var(--bg-card); border-radius: 16px; padding: 30px; max-width: 500px; margin: 50px auto; }
        .form-title { font-size: 24px; color: #667eea; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid var(--border-color); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-primary); font-weight: 600; font-size: 14px; }
        .form-group input, .form-group select { width: 100%; padding: 10px 12px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 14px; background: var(--bg-card); color: var(--text-primary); }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #667eea; }
        .form-group small { display: block; margin-top: 5px; font-size: 11px; color: var(--text-secondary); }
        .password-container { position: relative; display: flex; align-items: center; }
        .password-container input { width: 100%; padding: 10px 35px 10px 12px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--bg-card); color: var(--text-primary); }
        .toggle-password { position: absolute; right: 10px; background: none; border: none; cursor: pointer; font-size: 16px; }
        .form-actions { display: flex; gap: 15px; justify-content: flex-end; margin-top: 30px; }
        .btn-guardar { background: linear-gradient(135deg, #28a745 0%, #20c997 100%); color: white; padding: 10px 25px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; }
        .btn-cancelar { background: #6c757d; color: white; padding: 10px 25px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; text-decoration: none; display: inline-block; text-align: center; }
        .separador { margin: 20px 0; border-top: 1px solid var(--border-color); position: relative; }
        .separador span { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: var(--bg-card); padding: 0 10px; color: var(--text-secondary); font-size: 12px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>✏️ Editar Usuario</h1>
        <div style="display: flex; align-items: center; gap: 15px;">
            <button id="themeToggle" class="theme-btn">🌙 Dark</button>
            <a href="{{ url_for('usuarios') }}" class="btn-home">← Volver</a>
            <a href="{{ url_for('logout') }}" class="btn-logout">🚪 Salir</a>
        </div>
    </div>
    <div class="form-container">
        <div class="form-title">Editando: {{ usuario.usuario_id }}</div>
        <form method="POST">
            <div class="form-group"><label>👤 Usuario ID</label><input type="text" name="usuario_id" value="{{ usuario.usuario_id }}" required></div>
            <div class="form-group"><label>👑 Rol</label><select name="rol"><option value="NORMAL" {% if usuario.rol == 'NORMAL' %}selected{% endif %}>👤 NORMAL</option><option value="ADMIN" {% if usuario.rol == 'ADMIN' %}selected{% endif %}>👑 ADMIN</option></select></div>
            <div class="separador"><span>Opcional</span></div>
            <div class="form-group"><label>🔐 Cambiar Contraseña</label>
                <div class="password-container">
                    <input type="password" name="nueva_contrasena" id="nueva_contrasena" placeholder="Dejar en blanco para no cambiar">
                    <button type="button" class="toggle-password" onclick="togglePassword('nueva_contrasena')">👁️</button>
                </div>
                <small>Mínimo 4 caracteres</small>
            </div>
            <div class="form-actions"><a href="{{ url_for('usuarios') }}" class="btn-cancelar">Cancelar</a><button type="submit" class="btn-guardar">💾 Guardar Cambios</button></div>
        </form>
    </div>
    <script>
        function togglePassword(id) {
            const input = document.getElementById(id);
            const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
            input.setAttribute('type', type);
        }
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('darkMode', isDark);
            const btn = document.getElementById('themeToggle');
            if (btn) btn.textContent = isDark ? '☀️ Light' : '🌙 Dark';
        }
        const savedDarkMode = localStorage.getItem('darkMode') === 'true';
        if (savedDarkMode) {
            document.body.classList.add('dark-mode');
            const btn = document.getElementById('themeToggle');
            if (btn) btn.textContent = '☀️ Light';
        }
        const toggleBtn = document.getElementById('themeToggle');
        if (toggleBtn) toggleBtn.addEventListener('click', toggleTheme);
    </script>
</body>
</html>
