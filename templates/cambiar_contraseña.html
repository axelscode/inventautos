<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INVENTAUTOS - Cambiar Contraseña</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .form-container { background: var(--bg-card); border-radius: 16px; padding: 30px; max-width: 450px; margin: 50px auto; }
        .form-title { font-size: 24px; color: #667eea; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid var(--border-color); text-align: center; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-primary); font-weight: 600; font-size: 14px; }
        .form-group input { width: 100%; padding: 12px 15px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 14px; background: var(--bg-card); color: var(--text-primary); }
        .form-group input:focus { outline: none; border-color: #667eea; }
        .form-group small { display: block; margin-top: 5px; font-size: 11px; color: var(--text-secondary); }
        .password-container { position: relative; display: flex; align-items: center; }
        .password-container input { width: 100%; padding: 12px 40px 12px 15px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--bg-card); color: var(--text-primary); }
        .toggle-password { position: absolute; right: 12px; background: none; border: none; cursor: pointer; font-size: 18px; }
        .form-actions { display: flex; gap: 15px; justify-content: flex-end; margin-top: 30px; }
        .btn-guardar { background: linear-gradient(135deg, #28a745 0%, #20c997 100%); color: white; padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; }
        .btn-cancelar { background: #6c757d; color: white; padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; text-decoration: none; display: inline-block; text-align: center; }
        .alert { margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔐 Cambiar Contraseña</h1>
        <div style="display: flex; align-items: center; gap: 15px;">
            <button id="themeToggle" class="theme-btn">🌙 Dark</button>
            <a href="{{ url_for('inventario') }}" class="btn-home">🏠 Home</a>
            <a href="{{ url_for('logout') }}" class="btn-logout">🚪 Salir</a>
        </div>
    </div>
    <div class="form-container">
        <div class="form-title">Cambiar mi contraseña</div>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}{% for category, message in messages %}<div class="alert alert-{{ category }}">{{ message }}</div>{% endfor %}{% endif %}
        {% endwith %}
        <form method="POST" action="{{ url_for('cambiar_mi_contraseña') }}">
            <div class="form-group"><label>🔒 Contraseña Actual</label>
                <div class="password-container">
                    <input type="password" name="contrasena_actual" id="contrasena_actual" required placeholder="Ingresa tu contraseña actual">
                    <button type="button" class="toggle-password" onclick="togglePassword('contrasena_actual')">👁️</button>
                </div>
            </div>
            <div class="form-group"><label>🔐 Nueva Contraseña</label>
                <div class="password-container">
                    <input type="password" name="nueva_contrasena" id="nueva_contrasena" required placeholder="Mínimo 4 caracteres">
                    <button type="button" class="toggle-password" onclick="togglePassword('nueva_contrasena')">👁️</button>
                </div>
                <small>La contraseña debe tener al menos 4 caracteres</small>
            </div>
            <div class="form-group"><label>✅ Confirmar Nueva Contraseña</label>
                <div class="password-container">
                    <input type="password" name="confirmar_contrasena" id="confirmar_contrasena" required placeholder="Repite la nueva contraseña">
                    <button type="button" class="toggle-password" onclick="togglePassword('confirmar_contrasena')">👁️</button>
                </div>
            </div>
            <div class="form-actions"><a href="{{ url_for('inventario') }}" class="btn-cancelar">Cancelar</a><button type="submit" class="btn-guardar">💾 Cambiar Contraseña</button></div>
        </form>
    </div>
    <script>
        function togglePassword(id) {
            const input = document.getElementById(id);
            const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
            input.setAttribute('type', type);
        }
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('darkMode', isDark);
            const btn = document.getElementById('themeToggle');
            if (btn) btn.textContent = isDark ? '☀️ Light' : '🌙 Dark';
        }
        const savedDarkMode = localStorage.getItem('darkMode') === 'true';
        if (savedDarkMode) {
            document.body.classList.add('dark-mode');
            const btn = document.getElementById('themeToggle');
            if (btn) btn.textContent = '☀️ Light';
        }
        const toggleBtn = document.getElementById('themeToggle');
        if (toggleBtn) toggleBtn.addEventListener('click', toggleTheme);
    </script>
</body>
</html>
