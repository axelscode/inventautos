<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Vehículo</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="header">
        <h1>🚗 Editar Vehículo</h1>
        <a href="{{ url_for('inventario') }}" class="btn-logout">← Volver</a>
    </div>
    
    <div class="table-container">
        <form method="POST">
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px;">
                <div><label>Chassis:</label><input type="text" name="chassis" value="{{ vehiculo.chassis }}" required></div>
                <div><label>Estatus:</label><input type="text" name="estatus" value="{{ vehiculo.estatus }}"></div>
                <div><label>Marca:</label><input type="text" name="marca" value="{{ vehiculo.marca }}" required></div>
                <div><label>Modelo:</label><input type="text" name="modelo" value="{{ vehiculo.modelo }}" required></div>
                <div><label>Tipo:</label><input type="text" name="tipo" value="{{ vehiculo.tipo }}"></div>
                <div><label>Año:</label><input type="number" name="ano" value="{{ vehiculo.ano }}"></div>
                <div><label>Color:</label><input type="text" name="color" value="{{ vehiculo.color }}"></div>
                <div><label>Precio:</label><input type="number" step="0.01" name="precio" value="{{ vehiculo.precio }}"></div>
                <div><label>Precio Contado:</label><input type="number" step="0.01" name="precio_contado" value="{{ vehiculo.precio_contado }}"></div>
                <div><label>Precio Financiamiento:</label><input type="number" step="0.01" name="precio_financiamiento" value="{{ vehiculo.precio_financiamiento }}"></div>
                <div><label>Locación:</label><input type="text" name="locacion" value="{{ vehiculo.locacion }}"></div>
                <div><label>País:</label><input type="text" name="pais" value="{{ vehiculo.pais }}"></div>
                <div><label>BL:</label><input type="text" name="bl" value="{{ vehiculo.bl }}"></div>
            </div>
            <div style="margin-top: 20px;">
                <button type="submit" class="btn-agregar">Actualizar</button>
            </div>
        </form>
    </div>
</body>
</html>
