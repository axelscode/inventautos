<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INVENTAUTOS - Editar Vehículo</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .form-container { background: var(--bg-card); border-radius: 16px; padding: 25px; max-width: 900px; margin: 0 auto; }
        .form-title { font-size: 24px; color: #667eea; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid var(--border-color); }
        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-weight: 600; margin-bottom: 8px; color: var(--text-primary); font-size: 13px; }
        .form-group label .required { color: #dc3545; }
        .form-group input, .form-group select { padding: 10px 12px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 14px; background: var(--bg-card); color: var(--text-primary); }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #667eea; }
        .form-group.full-width { grid-column: span 2; }
        .form-actions { margin-top: 30px; display: flex; gap: 15px; justify-content: flex-end; }
        .btn-actualizar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 12px 30px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; }
        .btn-cancelar { background: #6c757d; color: white; padding: 12px 30px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; text-decoration: none; display: inline-block; text-align: center; }
        @media (max-width: 768px) { .form-grid { grid-template-columns: 1fr; } .form-group.full-width { grid-column: span 1; } .form-actions { flex-direction: column; } .btn-actualizar, .btn-cancelar { width: 100%; text-align: center; } }
    </style>
</head>
<body>
    <div class="header">
        <h1>✏️ Editar Vehículo</h1>
        <div style="display: flex; align-items: center; gap: 15px;">
            <button id="themeToggle" class="theme-btn">🌙 Dark</button>
            <a href="{{ url_for('inventario') }}" class="btn-home">🏠 Home</a>
            <a href="{{ url_for('logout') }}" class="btn-logout">🚪 Salir</a>
        </div>
    </div>
    <div class="form-container">
        <div class="form-title">✏️ Editando Vehículo #{{ vehiculo.id }}</div>
        <form method="POST">
            <div class="form-grid">
                <div class="form-group"><label>Chassis <span class="required">*</span></label><input type="text" name="chassis" value="{{ vehiculo.chassis }}" required></div>
                <div class="form-group"><label>Estatus</label><select name="estatus"><option value="DISPONIBLE" {% if vehiculo.estatus == 'DISPONIBLE' %}selected{% endif %}>DISPONIBLE</option><option value="VENDIDO" {% if vehiculo.estatus == 'VENDIDO' %}selected{% endif %}>VENDIDO</option><option value="RESERVADO" {% if vehiculo.estatus == 'RESERVADO' %}selected{% endif %}>RESERVADO</option></select></div>
                <div class="form-group"><label>Marca <span class="required">*</span></label><input type="text" name="marca" value="{{ vehiculo.marca }}" required></div>
                <div class="form-group"><label>Modelo <span class="required">*</span></label><input type="text" name="modelo" value="{{ vehiculo.modelo }}" required></div>
                <div class="form-group"><label>Tipo</label><input type="text" name="tipo" value="{{ vehiculo.tipo }}"></div>
                <div class="form-group"><label>Año</label><input type="number" name="ano" value="{{ vehiculo.ano }}"></div>
                <div class="form-group"><label>Color</label><input type="text" name="color" value="{{ vehiculo.color }}"></div>
                <div class="form-group"><label>Precio Normal</label><input type="number" step="0.01" name="precio" value="{{ vehiculo.precio }}"></div>
                <div class="form-group"><label>Precio Contado</label><input type="number" step="0.01" name="precio_contado" value="{{ vehiculo.precio_contado }}"></div>
                <div class="form-group"><label>Precio Financiamiento</label><input type="number" step="0.01" name="precio_financiamiento" value="{{ vehiculo.precio_financiamiento }}"></div>
                <div class="form-group"><label>Locación</label><input type="text" name="locacion" value="{{ vehiculo.locacion }}"></div>
                <div class="form-group"><label>País</label><input type="text" name="pais" value="{{ vehiculo.pais }}"></div>
                <div class="form-group full-width"><label>BL</label><input type="text" name="bl" value="{{ vehiculo.bl }}"></div>
            </div>
            <div class="form-actions">
                <a href="{{ url_for('inventario') }}" class="btn-cancelar">Cancelar</a>
                <button type="submit" class="btn-actualizar">💾 Actualizar Vehículo</button>
            </div>
        </form>
    </div>
    <script>
        function toggleTheme() { document.body.classList.toggle('dark-mode'); const isDark = document.body.classList.contains('dark-mode'); localStorage.setItem('darkMode', isDark); const btn = document.getElementById('themeToggle'); if (btn) btn.textContent = isDark ? '☀️ Light' : '🌙 Dark'; }
        const savedDarkMode = localStorage.getItem('darkMode') === 'true'; if (savedDarkMode) { document.body.classList.add('dark-mode'); const btn = document.getElementById('themeToggle'); if (btn) btn.textContent = '☀️ Light'; }
        const toggleBtn = document.getElementById('themeToggle'); if (toggleBtn) toggleBtn.addEventListener('click', toggleTheme);
    </script>
</body>
</html>
