<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INVENTAUTOS - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* Estilos específicos para el login */
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-body);
            margin: -10px;
            padding: 20px;
        }
        
        .login-card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-header h1 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .login-header p {
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        .theme-toggle-login {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }
        
        .theme-btn-login {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-primary);
            font-weight: 600;
            font-size: 14px;
        }
        
        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-size: 14px;
            background: var(--bg-card);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        
        .btn-entrar {
            flex: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
        }
        
        .btn-cancelar {
            flex: 1;
            background: #6c757d;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
        }
        
        .btn-entrar:hover, .btn-cancelar:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        
        .alert {
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 12px;
            font-size: 13px;
        }
        
        .alert-success {
            background: #d4edda;
            color: #155724;
        }
        
        .alert-error {
            background: #f8d7da;
            color: #721c24;
        }
        
        body.dark-mode .alert-success {
            background: #1e3a2e;
            color: #90ee90;
        }
        
        body.dark-mode .alert-error {
            background: #3a1e24;
            color: #ff9999;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="theme-toggle-login">
                <button id="themeToggle" class="theme-btn-login">🌙 Dark Mode</button>
            </div>
            
            <div class="login-header">
                <h1>🚗 INVENTAUTOS</h1>
                <p>Acceso a tu cuenta</p>
            </div>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            
            <form method="POST">
                <div class="input-group">
                    <label>👤 Usuario ID</label>
                    <input type="text" name="usuario_id" required autofocus placeholder="Ej: admin">
                </div>
                
                <div class="input-group">
                    <label>🔒 Contraseña</label>
                    <input type="password" name="contrasena" required placeholder="••••••">
                </div>
                
                <div class="input-group">
                    <label>🔐 Código de seguridad</label>
                    <input type="text" name="codigo" required placeholder="Ingresa el código">
                </div>
                
                <div class="button-group">
                    <button type="reset" class="btn-cancelar">Cancelar</button>
                    <button type="submit" class="btn-entrar">Entrar</button>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('darkMode', isDark);
            const btn = document.getElementById('themeToggle');
            if (btn) {
                btn.textContent = isDark ? '☀️ Light Mode' : '🌙 Dark Mode';
            }
        }
        
        const savedDarkMode = localStorage.getItem('darkMode') === 'true';
        if (savedDarkMode) {
            document.body.classList.add('dark-mode');
            const btn = document.getElementById('themeToggle');
            if (btn) {
                btn.textContent = '☀️ Light Mode';
            }
        }
        
        const toggleBtn = document.getElementById('themeToggle');
        if (toggleBtn) {
            toggleBtn.addEventListener('click', toggleTheme);
        }
    </script>
</body>
</html>
