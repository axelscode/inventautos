<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INVENTAUTOS - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            overflow-x: hidden;
            position: relative;
        }

        /* Partículas animadas */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .bg-animation span {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            animation: float 15s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-20vh) scale(1); opacity: 0; }
        }

        .login-wrapper {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 48px 40px;
            width: 100%;
            max-width: 480px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
            transition: all 0.4s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 36px;
            box-shadow: 0 10px 25px -5px rgba(102, 126, 234, 0.4);
        }

        .login-header h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #a8b2ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .login-header p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }

        .theme-toggle-login {
            position: absolute;
            top: 24px;
            right: 24px;
        }

        .theme-btn-login {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .input-group {
            margin-bottom: 24px;
        }

        .input-group label {
            display: block;
            margin-bottom: 10px;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 500;
            font-size: 13px;
        }

        .input-group label i {
            margin-right: 8px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 48px 14px 18px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            color: white;
            transition: all 0.3s ease;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.12);
        }

        .toggle-password {
            position: absolute;
            right: 16px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            font-size: 18px;
        }

        /* CAPTCHA MODERNO */
        .captcha-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 28px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .captcha-label {
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .captcha-box {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 16px;
        }

        .captcha-imagen {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 8px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .captcha-imagen img {
            width: 100%;
            height: auto;
            border-radius: 12px;
        }

        .captcha-buttons {
            display: flex;
            gap: 8px;
        }

        .btn-captcha {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            padding: 12px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .btn-captcha:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.02);
        }

        .captcha-input input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            color: white;
            text-align: center;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        .captcha-input input:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 16px;
            margin-top: 32px;
        }

        .btn-entrar {
            flex: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 14px 24px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-entrar:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(102, 126, 234, 0.5);
        }

        .btn-cancelar {
            flex: 1;
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.9);
            padding: 14px 24px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 40px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-cancelar:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .alert {
            padding: 14px 18px;
            margin-bottom: 24px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }

        .alert-success {
            background: rgba(40, 167, 69, 0.15);
            color: #90ee90;
            border: 1px solid rgba(40, 167, 69, 0.3);
        }

        .alert-error {
            background: rgba(220, 53, 69, 0.15);
            color: #ff9999;
            border: 1px solid rgba(220, 53, 69, 0.3);
        }

        /* Modo Claro */
        body.light-mode {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
        }

        body.light-mode .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: none;
        }

        body.light-mode .login-header h1 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        body.light-mode .input-group label {
            color: #333;
        }

        body.light-mode .input-wrapper input {
            background: #f8f9fa;
            border-color: #e0e0e0;
            color: #333;
        }

        body.light-mode .captcha-section {
            background: #f0f2f5;
        }

        body.light-mode .btn-captcha {
            background: #e0e0e0;
            color: #666;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 32px 24px;
            }
            .captcha-box {
                flex-direction: column;
            }
            .captcha-buttons {
                width: 100%;
                justify-content: center;
            }
            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation" id="particles"></div>

    <div class="theme-toggle-login">
        <button id="themeToggle" class="theme-btn-login">
            <i class="fas fa-moon"></i> Modo Oscuro
        </button>
    </div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-icon">🚗</div>
                <h1>INVENTAUTOS</h1>
                <p>Bienvenido de vuelta</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">
                            <i class="fas {% if category == 'success' %}fa-check-circle{% else %}fa-exclamation-circle{% endif %}"></i> {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" id="loginForm">
                <div class="input-group">
                    <label><i class="fas fa-user"></i> Usuario ID</label>
                    <div class="input-wrapper">
                        <input type="text" name="usuario_id" required autofocus placeholder="admin">
                    </div>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-lock"></i> Contraseña</label>
                    <div class="input-wrapper">
                        <input type="password" name="contrasena" id="password" required placeholder="••••••">
                        <button type="button" class="toggle-password" onclick="togglePassword('password')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- CAPTCHA MODERNO CON IMAGEN -->
                <div class="captcha-section">
                    <div class="captcha-label">
                        <i class="fas fa-shield-alt"></i> Código de Verificación
                    </div>
                    <div class="captcha-box">
                        <div class="captcha-imagen">
                            <img id="captchaImg" src="{{ url_for('captcha_imagen') }}" alt="CAPTCHA">
                        </div>
                        <div class="captcha-buttons">
                            <button type="button" class="btn-captcha" onclick="refrescarCaptcha()" title="Actualizar CAPTCHA">
                                <i class="fas fa-sync-alt"></i>
                            </button>
                            <button type="button" class="btn-captcha" onclick="reproducirAudio()" title="Escuchar código">
                                <i class="fas fa-volume-up"></i>
                            </button>
                        </div>
                    </div>
                    <div class="captcha-input">
                        <input type="text" name="captcha" id="captcha" placeholder="Ingresa el código de la imagen" required autocomplete="off">
                    </div>
                </div>

                <div class="button-group">
                    <button type="reset" class="btn-cancelar">
                        <i class="fas fa-times"></i> Cancelar
                    </button>
                    <button type="submit" class="btn-entrar">
                        <i class="fas fa-arrow-right"></i> Entrar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Partículas
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 80; i++) {
                const particle = document.createElement('span');
                particle.style.width = (Math.random() * 6 + 2) + 'px';
                particle.style.height = particle.style.width;
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = (Math.random() * 20 + 10) + 's';
                particle.style.animationDelay = Math.random() * 10 + 's';
                container.appendChild(particle);
            }
        }
        createParticles();

        function togglePassword(id) {
            const input = document.getElementById(id);
            const icon = input.nextElementSibling.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        function refrescarCaptcha() {
            const img = document.getElementById('captchaImg');
            img.src = "{{ url_for('captcha_imagen') }}?" + new Date().getTime();
            document.getElementById('captcha').value = '';
        }

        function reproducirAudio() {
            const audio = new Audio("{{ url_for('captcha_audio') }}?" + new Date().getTime());
            audio.play().catch(e => console.log('Error al reproducir audio:', e));
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            localStorage.setItem('lightMode', isLight);
            const btn = document.getElementById('themeToggle');
            if (btn) {
                btn.innerHTML = isLight ? '<i class="fas fa-moon"></i> Modo Oscuro' : '<i class="fas fa-sun"></i> Modo Claro';
            }
        }

        const savedLightMode = localStorage.getItem('lightMode') === 'true';
        if (savedLightMode) {
            document.body.classList.add('light-mode');
            const btn = document.getElementById('themeToggle');
            if (btn) btn.innerHTML = '<i class="fas fa-moon"></i> Modo Oscuro';
        }

        const toggleBtn = document.getElementById('themeToggle');
        if (toggleBtn) toggleBtn.addEventListener('click', toggleTheme);
    </script>
</body>
</html>
